<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Permissions-Policy" content="microphone=(self)">
    <title>Proyección Audioreactiva de 5 Capas</title>
    <style>
        body, html { 
            margin: 0; padding: 0; overflow: hidden; 
            background: #000; height: 100%; width: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Escenario principal que detectará el clic inicial */
     .stage { 
            position: relative; 
            width: 100vw; height: 100vh; 
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; /* Indica que se puede interactuar */
        }

        /* Estilo para las capas (Escala original con width: auto) */
     .layer { 
            position: absolute; 
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            pointer-events: none; /* No interfieren con el clic en el stage */
            width: auto; height: auto;
            max-width: 100%; max-height: 100%;
        }

        /* Capa 1: Fondo (Base) */
     .capa-1 { z-index: 1; width: 100%; height: 100%; object-fit: cover; }
        
        /* Capa 2: Bajos (Escala rítmica) */
        #img-bajos { z-index: 2; transition: transform 0.05s ease-out; }
        
     .capa-3 { z-index: 3; }
     .capa-4 { z-index: 4; }
        
        /* Capa 5: Agudos (Opacidad) */
        #img-altas { z-index: 5; opacity: 0; transition: opacity 0.05s ease-out; }

        /* Mensaje de inicio (se oculta tras el primer clic) */
        #msg-intro {
            position: absolute; top: 20px; width: 100%; 
            text-align: center; color: rgba(255,255,255,0.7); 
            z-index: 999; font-size: 1rem; letter-spacing: 1px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="msg-intro">Haz clic en cualquier lugar para iniciar la proyección</div>

    <div class="stage" id="main-stage">
        <img src="./capa1.PNG" class="layer capa-1">
        <img src="./capa2.PNG" id="img-bajos" class="layer">
        <img src="./capa3.PNG" class="layer capa-3">
        <img src="./capa4.PNG" class="layer capa-4">
        <img src="./capa5.PNG" id="img-altas" class="layer">
    </div>

    <script>
        const stage = document.getElementById('main-stage');
        const msg = document.getElementById('msg-intro');
        const imgBajos = document.getElementById('img-bajos');
        const imgAltas = document.getElementById('img-altas');

        let audioCtx, analyser, dataArray;
        let isStarted = false;

        // Escuchar clic en cualquier parte de la pantalla [1, 2]
        window.addEventListener('click', async () => {
            if (isStarted) return; // Evita inicializar múltiples veces

            try {
                // Crear contexto de audio (obligatorio tras gesto del usuario) [4, 5]
                audioCtx = new (window.AudioContext |

| window.webkitAudioContext)();
                
                // Solicitar acceso al micrófono 
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioCtx.createMediaStreamSource(stream);
                
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 1024;
                source.connect(analyser);

                const bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);

                // Ocultar mensaje e iniciar bucle de renderizado
                msg.style.display = 'none';
                isStarted = true;
                render();
            } catch (err) {
                console.error("No se pudo iniciar:", err);
                alert("Error: Debes permitir el acceso al micrófono en el navegador.");
            }
        });

        function render() {
            requestAnimationFrame(render);
            analyser.getByteFrequencyData(dataArray); 

            // --- LÓGICA DE BAJOS (Capa 2) ---
            let lowSum = 0;
            const lowRange = 10; 
            for(let i = 0; i < lowRange; i++) lowSum += dataArray[i];
            let lowAvg = lowSum / lowRange;
            
            // Fórmula de escala (1 = tamaño original, hasta 1.5 con bajos potentes) [6, 7]
            let scaleValue = 1 + (lowAvg / 255) * 0.5;
            imgBajos.style.transform = `translate(-50%, -50%) scale(${scaleValue})`;

            // --- LÓGICA DE AGUDOS (Capa 5) ---
            let highSum = 0;
            const startAgudos = 100;
            const endAgudos = 300;
            for(let i = startAgudos; i < endAgudos; i++) highSum += dataArray[i];
            let highAvg = highSum / (endAgudos - startAgudos);
            
            // Opacidad proporcional al brillo del sonido agudo
            imgAltas.style.opacity = highAvg / 100; 
        }
    </script>
</body>
</html>
