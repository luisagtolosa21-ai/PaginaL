<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador Audioreactivo 5 Capas</title>
    <meta http-equiv="Permissions-Policy" content="microphone=(self)">
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; height: 100%; font-family: sans-serif; }
       .stage { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }

        /* Estilos de Capas - Usando tus nombres exactos de archivo */
       .layer { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; }

        /* Capa 1: Tu fondo */
       .capa-1 { z-index: 1; width: 100%; height: 100%; object-fit: cover; pointer-events: auto; }
        /* Capa 2: Reactiva a BAJOS */
        #img-bajos { z-index: 2; width: 450px; transition: transform 0.05s ease-out; }
        /* Capas 3 y 4: Estáticas */
       .capa-3 { z-index: 3; width: 400px; }
       .capa-4 { z-index: 4; width: 350px; }
        /* Capa 5: Reactiva a AGUDOS */
        #img-altas { z-index: 5; width: 300px; opacity: 0; transition: opacity 0.05s ease-out; }

        #btn-start {
            position: absolute; z-index: 100; padding: 20px 40px;
            background: #2ed573; color: white; border: none; border-radius: 50px;
            cursor: pointer; font-size: 1.2rem; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <button id="btn-start">EMPEZAR PROYECCIÓN</button>

    <div class="stage">
        <img src="./capa1.PNG" class="layer capa-1" alt="Fondo">
        <img src="./capa2.PNG" id="img-bajos" class="layer" alt="Capa Bajos">
        <img src="./capa3.PNG" class="layer capa-3" alt="Capa 3">
        <img src="./capa4.PNG" class="layer capa-4" alt="Capa 4">
        <img src="./capa5.PNG" id="img-altas" class="layer" alt="Capa Altas">
    </div>

    <script>
        const btn = document.getElementById('btn-start');
        const imgBajos = document.getElementById('img-bajos');
        const imgAltas = document.getElementById('img-altas');

        let audioCtx, analyser, dataArray;

        btn.addEventListener('click', async () => {
            // El contexto de audio DEBE crearse o reanudarse tras un clic
            if (!audioCtx) {
                try {
                    audioCtx = new (window.AudioContext |

| window.webkitAudioContext)();
                    
                    // Pedir permiso de micrófono expresamente
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true }); 
                    const source = audioCtx.createMediaStreamSource(stream);
                    
                    analyser = audioCtx.createAnalyser();
                    analyser.fftSize = 1024;
                    source.connect(analyser);

                    const bufferLength = analyser.frequencyBinCount;
                    dataArray = new Uint8Array(bufferLength);

                    btn.style.display = 'none'; // Ocultar botón al iniciar
                    draw();
                } catch (err) {
                    console.error("Error de acceso:", err);
                    alert("Por favor, permite el acceso al micrófono en la parte superior del navegador.");
                }
            } else if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        });

        function draw() {
            requestAnimationFrame(draw);
            analyser.getByteFrequencyData(dataArray); [1]

            // Lógica de Bajos (Capa 2)
            let lowSum = 0;
            for(let i = 0; i < 10; i++) lowSum += dataArray[i];
            let lowAvg = lowSum / 10;
            let scale = 1 + (lowAvg / 255) * 0.8;
            imgBajos.style.transform = `translate(-50%, -50%) scale(${scale})`;

            // Lógica de Agudos (Capa 5)
            let highSum = 0;
            for(let i = 100; i < 250; i++) highSum += dataArray[i];
            let highAvg = highSum / 150;
            imgAltas.style.opacity = highAvg / 100; 
        }
    </script>
</body>
</html>
