<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Visualizador Pro</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; height: 100%; }
       .stage { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        
        /* Posicionamiento absoluto centrado para todas las capas */
       .layer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: block;
            pointer-events: none; /* Evita que las imágenes bloqueen el clic al botón */
        }

       .capa-1 { z-index: 1; width: 100%; height: 100%; object-fit: cover; pointer-events: auto; }
       .capa-2 { z-index: 2; width: 450px; } /* Reacciona a bajos */
       .capa-3 { z-index: 3; width: 400px; }
       .capa-4 { z-index: 4; width: 350px; }
       .capa-5 { z-index: 5; width: 300px; opacity: 0; } /* Reacciona a agudos */

        #start-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            padding: 20px 40px;
            background: #2ed573;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <button id="start-btn">EMPEZAR PROYECCIÓN</button>

    <div class="stage">
        <img src="fondo.jpg" class="layer capa-1" onerror="console.log('Error: fondo.jpg no encontrado')">
        <img src="capa2.png" id="img-bajos" class="layer capa-2" onerror="console.log('Error: capa2.png no encontrado')">
        <img src="capa3.png" class="layer capa-3" onerror="console.log('Error: capa3.png no encontrado')">
        <img src="capa4.png" class="layer capa-4" onerror="console.log('Error: capa4.png no encontrado')">
        <img src="capa5.png" id="img-altas" class="layer capa-5" onerror="console.log('Error: capa5.png no encontrado')">
    </div>

    <script>
        const btn = document.getElementById('start-btn');
        const imgBajos = document.getElementById('img-bajos');
        const imgAltas = document.getElementById('img-altas');

        let audioCtx, analyser, dataArray;

        btn.addEventListener('click', async () => {
            try {
                // Crear contexto de audio
                audioCtx = new (window.AudioContext |

| window.webkitAudioContext)();
                
                // Pedir permiso de micrófono
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioCtx.createMediaStreamSource(stream);
                
                analyser = audioCtx.createAnalyser(); [2]
                analyser.fftSize = 1024; // Resolución balanceada [2, 3]
                
                source.connect(analyser); [4]
                // No conectamos a audioCtx.destination para evitar eco (feedback)

                const bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength); [4, 2]

                btn.style.display = 'none'; // Ocultar botón tras iniciar
                render();
            } catch (err) {
                console.error("Fallo al iniciar:", err);
                alert("Error: Asegúrate de usar HTTPS y permitir el micrófono.");
            }
        });

        function render() {
            requestAnimationFrame(render); [2]
            analyser.getByteFrequencyData(dataArray); [2]

            // --- BAJOS: Índices 0 al 10 ---
            let lowSum = 0;
            for(let i = 0; i < 10; i++) lowSum += dataArray[i];
            let lowAvg = lowSum / 10;
            let scale = 1 + (lowAvg / 255) * 0.7; // Sensibilidad de escala
            imgBajos.style.transform = `translate(-50%, -50%) scale(${scale})`; [5, 6]

            // --- AGUDOS: Índices 100 al 250 ---
            let highSum = 0;
            for(let i = 100; i < 250; i++) highSum += dataArray[i];
            let highAvg = highSum / 150;
            imgAltas.style.opacity = highAvg / 150; // Sensibilidad de aparición
        }
    </script>
</body>
</html>
